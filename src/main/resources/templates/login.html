<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в платформата</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-4">

            <div class="card shadow border-0 p-4">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Вход в системата</h3>

                    <div class="alert alert-danger text-center" role="alert" th:if="${param.error}">
                        Грешно потребителско име или парола!
                    </div>

                    <form th:action="@{/view/login}" method="POST">

                        <div class="mb-3">
                            <label for="username" class="form-label">Потребителско име</label>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username" placeholder="Въведете username"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Парола</label>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password" placeholder="Въведете парола"
                                   required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">Влез</button>
                        </div>

                    </form>
                    <hr class="my-4">
                    <div class="text-center">
                        <small class="text-muted">Нямате профил? <a href="#">Регистрирайте се тук</a></small>
                    </div>
                    <div class="text-center mt-2">
                        <a href="/view/offers" class="text-decoration-none small">← Обратно към обявите</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
